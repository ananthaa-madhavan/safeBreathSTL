<!DOCTYPE html>
<html>
<head>
  <title>BreathSafeSTL</title>

  <link rel="stylesheet" href="style.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
</head>

<body>

  <div class="top-banner">BreathSafeSTL</div>

  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="design.html">Design Process</a>
  </div>

  <!-- PM TOGGLE -->
  <div class="pm-toggle">
    <div class="pm-title">PM Layers</div>

    <button onclick="setPM('pm1')">PM1</button>
    <button onclick="setPM('pm25')" class="active">PM2.5</button>
    <button onclick="setPM('pm10')">PM10</button>
  </div>

  <!-- 🌡 DATA TILES -->
  <div id="data-panel">

    <div class="tile">
      <div class="label">TEMP</div>
      <div class="value" id="tempTile">--</div>
    </div>

    <div class="tile">
      <div class="label">WEATHER</div>
      <div class="value" id="weatherTile">--</div>
    </div>

    <div class="tile">
      <div class="label">UV INDEX</div>
      <div class="value" id="uvTile">--</div>
    </div>

    <div class="tile">
      <div class="label">AQI</div>
      <div class="value" id="aqTile">--</div>
    </div>

  </div>

  <!-- MAP -->
  <div id="map"></div>

  <script src="script.js"></script>

</body>
</html>
